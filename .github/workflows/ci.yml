name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1
  CHECKPOINT_DISABLE: 1
  # Owner connection (migrations/seed) + RLS-subject app role (runtime/test).
  DATABASE_URL: postgresql://postgres@localhost:5432/clientforce
  APP_DATABASE_URL: postgresql://clientforce_app@localhost:5432/clientforce
  REDIS_URL: redis://localhost:6379
  # Dev/test auth verifier (HS256) — production uses OIDC/JWKS via AUTH_JWKS_URL.
  AUTH_DEV_SECRET: ci-dev-secret-not-for-production

jobs:
  build-lint-test:
    name: build · lint · test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: clientforce
          # Trust auth so both `postgres` and the `clientforce_app` role (created
          # by the RLS migration, no password) can connect in CI.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Migrate database (schema + RLS + app role)
        run: pnpm --filter @clientforce/db db:migrate

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
