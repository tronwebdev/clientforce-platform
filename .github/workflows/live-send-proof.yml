# A3 live-SEND verification (DEC-060a): the one manual run where sandbox is
# OFF and a single real email is delivered to the DEC-014 allow-listed inbox
# through the full send boundary. HARD-GATED in-script on SendGrid domain auth
# (SPF/DKIM verified) + a DMARC record — the gate cannot be bypassed. The same
# run proves a non-allow-listed recipient still refuses. Manual dispatch only.
name: live-send-proof

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type LIVE to confirm one real email will be sent to the allow-listed inbox'
        required: true

permissions:
  id-token: write
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1
  DATABASE_URL: postgresql://postgres@localhost:5432/clientforce
  APP_DATABASE_URL: postgresql://clientforce_app@localhost:5432/clientforce
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}

jobs:
  proof:
    name: domain-auth gate · one live delivery · allow-list refusal
    runs-on: ubuntu-latest
    environment: staging
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: clientforce
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Refuse without explicit confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "LIVE" ]; then
            echo "::error::Dispatch input 'confirm' must be exactly LIVE — refusing to run a live send."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clientforce/channels... build
      - run: pnpm --filter @clientforce/db db:migrate

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run live-send proof (gated in-script; key masked)
        run: |
          set -euo pipefail
          sendgrid="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name SENDGRID-API-KEY --query value -o tsv)"
          echo "::add-mask::$sendgrid"
          SENDGRID_API_KEY="$sendgrid" pnpm exec tsx packages/channels/scripts/live-send-proof.ts
