# P1.2 live verification (§G): ingest https://clientforce.io with real
# embeddings and print the ingestion-proof report. Manual dispatch only —
# reads OPENAI-API-KEY from Key Vault via the same OIDC identity as deploys.
name: knowledge-live-proof

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1
  DATABASE_URL: postgresql://postgres@localhost:5432/clientforce
  APP_DATABASE_URL: postgresql://clientforce_app@localhost:5432/clientforce
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}

jobs:
  proof:
    name: ingest clientforce.io · retrieve · report
    runs-on: ubuntu-latest
    environment: staging
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: clientforce
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clientforce/db build && pnpm --filter @clientforce/ai build && pnpm --filter @clientforce/knowledge build
      - run: pnpm --filter @clientforce/db db:migrate

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run live proof (key read from Key Vault, masked)
        run: |
          set -euo pipefail
          key="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name OPENAI-API-KEY --query value -o tsv)"
          echo "::add-mask::$key"
          OPENAI_API_KEY="$key" pnpm exec tsx packages/knowledge/scripts/live-proof.ts
