name: Deploy (staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  id-token: write # OIDC federated auth to Azure
  contents: read

env:
  RG: ${{ vars.AZURE_RESOURCE_GROUP }}
  LOCATION: ${{ vars.AZURE_LOCATION }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  CONTAINER_APPS_ENV: ${{ vars.CONTAINER_APPS_ENV }}
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: build · migrate · deploy · smoke
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Preflight gate, Part A: no secrets in the repo (T7_VERIFICATION.md §2) ──
      - name: Preflight — repo secret scan
        run: bash infra/scripts/secret-scan.sh

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Preflight gate, Part B: the environment is correctly provisioned ──
      - name: Preflight — verify Key Vault secrets + ACR + env exist
        run: bash infra/scripts/preflight.sh

      # ── Build & push images ──
      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build & push images
        run: |
          set -euo pipefail
          declare -A IMAGES=(
            [clientforce-api]=apps/api/Dockerfile
            [clientforce-worker]=apps/worker/Dockerfile
            [clientforce-web]=apps/web/Dockerfile
            [clientforce-migrate]=packages/db/Dockerfile
          )
          for name in "${!IMAGES[@]}"; do
            ref="$ACR_LOGIN_SERVER/$name:$IMAGE_TAG"
            echo "::group::build $ref"
            docker build -f "${IMAGES[$name]}" -t "$ref" .
            docker push "$ref"
            echo "::endgroup::"
          done

      # ── Deploy the app layer (creates/updates apps, identity, RBAC, job) ──
      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group "$RG" \
            --template-file infra/main.bicep \
            --parameters \
              location="$LOCATION" \
              containerAppsEnvName="$CONTAINER_APPS_ENV" \
              keyVaultName="$KEY_VAULT_NAME" \
              acrName="$ACR_NAME" \
              acrLoginServer="$ACR_LOGIN_SERVER" \
              imageTag="$IMAGE_TAG"

      # ── Run migrations (+ seed) inside the environment ──
      - name: Run migration job
        run: bash infra/scripts/run-migrate-job.sh clientforce-migrate

      # ── Smoke: api health + the web shell logs in against the cloud DB ──
      - name: Smoke test
        run: bash infra/scripts/smoke.sh
