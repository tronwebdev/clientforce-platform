name: Deploy (staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  id-token: write # OIDC federated auth to Azure
  contents: read

env:
  RG: ${{ vars.AZURE_RESOURCE_GROUP }}
  LOCATION: ${{ vars.AZURE_LOCATION }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  CONTAINER_APPS_ENV: ${{ vars.CONTAINER_APPS_ENV }}
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: build · migrate · deploy · smoke
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      webFqdn: ${{ steps.fqdn.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Preflight gate, Part A: no secrets in the repo (T7_VERIFICATION.md §2) ──
      - name: Preflight — repo secret scan
        run: bash infra/scripts/secret-scan.sh

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Preflight gate, Part B: the environment is correctly provisioned ──
      - name: Preflight — verify Key Vault secrets + ACR + env exist
        run: bash infra/scripts/preflight.sh

      # ── Build & push images ──
      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build & push images
        run: |
          set -euo pipefail
          # DEC-060b: the web client bundle inlines NEXT_PUBLIC_* at BUILD time,
          # so the publishable key must reach docker as a build-arg — Bicep's
          # runtime env alone leaves the browser blind to Clerk. Same all-four
          # gate as the Bicep clerkSecretsAvailable probe so image and infra
          # always agree. The key is public-by-design; masked regardless.
          clerk=true
          for name in CLERK-PUBLISHABLE-KEY CLERK-SECRET-KEY CLERK-JWKS-URL CLERK-ISSUER; do
            az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name "$name" --query id -o tsv >/dev/null 2>&1 || clerk=false
          done
          clerk_pk=""
          if [ "$clerk" = true ]; then
            clerk_pk="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name CLERK-PUBLISHABLE-KEY --query value -o tsv)"
            echo "::add-mask::$clerk_pk"
          fi
          declare -A IMAGES=(
            [clientforce-api]=apps/api/Dockerfile
            [clientforce-worker]=apps/worker/Dockerfile
            [clientforce-web]=apps/web/Dockerfile
            [clientforce-migrate]=packages/db/Dockerfile
          )
          for name in "${!IMAGES[@]}"; do
            ref="$ACR_LOGIN_SERVER/$name:$IMAGE_TAG"
            args=()
            if [ "$name" = "clientforce-web" ]; then
              args+=(--build-arg "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$clerk_pk")
            fi
            echo "::group::build $ref"
            docker build -f "${IMAGES[$name]}" "${args[@]}" -t "$ref" .
            docker push "$ref"
            echo "::endgroup::"
          done

      # ── Deploy the app layer (creates/updates apps, identity, RBAC, job) ──
      - name: Deploy Bicep
        run: |
          # P1.2: the storage secret is owner-provisioned; probe the vault so the
          # template only references it once it exists (a dangling secretRef
          # would fail the whole deploy).
          if az keyvault secret list --vault-name "$KEY_VAULT_NAME" --query "[].name" -o tsv | grep -qxF "STORAGE-CONNECTION-STRING"; then
            storage=true
          else
            storage=false
            echo "STORAGE-CONNECTION-STRING not in Key Vault yet — deploying without DOCUMENT upload storage."
          fi
          # P1.6/P1.7: probe the Temporal trio + the inbound-parse token the same way.
          temporal=true
          for name in TEMPORAL-ADDRESS TEMPORAL-NAMESPACE TEMPORAL-API-KEY; do
            if ! az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name "$name" --query id -o tsv >/dev/null 2>&1; then
              temporal=false
            fi
          done
          if [ "$temporal" = false ]; then
            echo "Temporal secrets incomplete in Key Vault — worker deploys without a Temporal endpoint (OWNER_CHECKLIST §4)."
          fi
          if az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name INBOUND-PARSE-TOKEN --query id -o tsv >/dev/null 2>&1; then
            inboundToken=true
          else
            inboundToken=false
            echo "INBOUND-PARSE-TOKEN not in Key Vault yet — inbound parse endpoint deploys without its URL token (P1.7 owner step)."
          fi
          if az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name SENDGRID-WEBHOOK-PUBLIC-KEY --query id -o tsv >/dev/null 2>&1; then
            sgWebhookKey=true
          else
            sgWebhookKey=false
            echo "SENDGRID-WEBHOOK-PUBLIC-KEY not in Key Vault yet — signed event webhooks stay rejected (P1.7 owner step)."
          fi
          # A3 (DEC-060): all four Clerk secrets must be present to wire Clerk.
          clerk=true
          for name in CLERK-PUBLISHABLE-KEY CLERK-SECRET-KEY CLERK-JWKS-URL CLERK-ISSUER; do
            if ! az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name "$name" --query id -o tsv >/dev/null 2>&1; then
              clerk=false
            fi
          done
          if [ "$clerk" = false ]; then
            echo "Clerk secrets not (fully) in Key Vault — the deploy stays on dev-token auth (A3 owner step)."
          fi
          # P2.1 (DEC-061): Twilio pair — both or neither.
          twilio=true
          for name in TWILIO-ACCOUNT-SID TWILIO-AUTH-TOKEN; do
            if ! az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name "$name" --query id -o tsv >/dev/null 2>&1; then
              twilio=false
            fi
          done
          if [ "$twilio" = false ]; then
            echo "Twilio secrets not (fully) in Key Vault — SMS transport stays unconfigured (P2.1 owner step)."
          fi
          # DEC-067: the SMS allow-list rides Key Vault (numbers never in the repo).
          if az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name SMS-ALLOWLIST --query id -o tsv >/dev/null 2>&1; then
            smsAllowlist=true
          else
            smsAllowlist=false
            echo "SMS-ALLOWLIST not in Key Vault — no live SMS recipients anywhere (DEC-063)."
          fi
          # P3.1 (DEC-078): the voice from-number + allow-list, same discipline.
          if az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name VOICE-FROM-NUMBER --query id -o tsv >/dev/null 2>&1; then
            voiceFrom=true
          else
            voiceFrom=false
            echo "VOICE-FROM-NUMBER not in Key Vault — the dialer stays unconfigured (dials refuse typed)."
          fi
          if az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name VOICE-ALLOWLIST --query id -o tsv >/dev/null 2>&1; then
            voiceAllowlist=true
          else
            voiceAllowlist=false
            echo "VOICE-ALLOWLIST not in Key Vault — no live voice recipients anywhere (DEC-063 analog)."
          # LH1 (DEC-087): ZeroBounce key — vendor-spine conditional wiring.
          # Canonical name first; the owner stored the key as ASMITH-KEY-L1
          # (message, 2026-07-15) — accepted as a fallback so staging lights
          # up without a vault rename. Normalizing to ZEROBOUNCE-API-KEY is
          # the documented owner step.
          zerobounce=false
          zerobounceSecretName=ZEROBOUNCE-API-KEY
          for name in ZEROBOUNCE-API-KEY ASMITH-KEY-L1; do
            if az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name "$name" --query id -o tsv >/dev/null 2>&1; then
              zerobounce=true
              zerobounceSecretName="$name"
              break
            fi
          done
          if [ "$zerobounce" = false ]; then
            echo "ZeroBounce key not in Key Vault (checked ZEROBOUNCE-API-KEY, ASMITH-KEY-L1) — email validation holds batches with the typed provider refusal (LH1 owner step)."
          fi
          az deployment group create \
            --resource-group "$RG" \
            --template-file infra/main.bicep \
            --parameters \
              location="$LOCATION" \
              containerAppsEnvName="$CONTAINER_APPS_ENV" \
              keyVaultName="$KEY_VAULT_NAME" \
              acrName="$ACR_NAME" \
              acrLoginServer="$ACR_LOGIN_SERVER" \
              imageTag="$IMAGE_TAG" \
              storageSecretAvailable="$storage" \
              temporalSecretsAvailable="$temporal" \
              inboundTokenAvailable="$inboundToken" \
              sgWebhookKeyAvailable="$sgWebhookKey" \
              clerkSecretsAvailable="$clerk" \
              twilioSecretsAvailable="$twilio" \
              smsAllowlistAvailable="$smsAllowlist" \
              voiceFromAvailable="$voiceFrom" \
              voiceAllowlistAvailable="$voiceAllowlist"
              zerobounceSecretAvailable="$zerobounce" \
              zerobounceSecretName="$zerobounceSecretName"

      # ── Expose the deployed web FQDN for the e2e job ──
      - name: Resolve web FQDN
        id: fqdn
        run: |
          web="$(az containerapp show --name clientforce-web --resource-group "$RG" --query "properties.configuration.ingress.fqdn" -o tsv)"
          echo "web=$web" >> "$GITHUB_OUTPUT"
          echo "web FQDN: $web"

      # ── Run migrations (+ seed) inside the environment ──
      - name: Run migration job
        run: bash infra/scripts/run-migrate-job.sh clientforce-migrate

      # ── Smoke: api health + the web shell logs in against the cloud DB ──
      - name: Smoke test
        run: bash infra/scripts/smoke.sh

  # ── E2E browser smoke (Playwright) against the deployed staging web shell.
  #    Proves the APP_DATABASE_URL RLS path: login → switch workspace → contacts
  #    re-scope (3 → 1). Read-only (no writes), so safe to run on every deploy. ──
  e2e:
    name: e2e (Playwright vs staging)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @clientforce/e2e exec playwright install --with-deps chromium

      - name: Run e2e against staging
        run: pnpm --filter @clientforce/e2e run e2e
        env:
          CI: "true"
          E2E_BASE_URL: https://${{ needs.deploy.outputs.webFqdn }}
