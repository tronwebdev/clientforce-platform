name: Deploy (staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  id-token: write # OIDC federated auth to Azure
  contents: read

env:
  RG: ${{ vars.AZURE_RESOURCE_GROUP }}
  LOCATION: ${{ vars.AZURE_LOCATION }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  CONTAINER_APPS_ENV: ${{ vars.CONTAINER_APPS_ENV }}
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: build · migrate · deploy · smoke
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      webFqdn: ${{ steps.fqdn.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Preflight gate, Part A: no secrets in the repo (T7_VERIFICATION.md §2) ──
      - name: Preflight — repo secret scan
        run: bash infra/scripts/secret-scan.sh

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Preflight gate, Part B: the environment is correctly provisioned ──
      - name: Preflight — verify Key Vault secrets + ACR + env exist
        run: bash infra/scripts/preflight.sh

      # ── Build & push images ──
      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build & push images
        run: |
          set -euo pipefail
          declare -A IMAGES=(
            [clientforce-api]=apps/api/Dockerfile
            [clientforce-worker]=apps/worker/Dockerfile
            [clientforce-web]=apps/web/Dockerfile
            [clientforce-migrate]=packages/db/Dockerfile
          )
          for name in "${!IMAGES[@]}"; do
            ref="$ACR_LOGIN_SERVER/$name:$IMAGE_TAG"
            echo "::group::build $ref"
            docker build -f "${IMAGES[$name]}" -t "$ref" .
            docker push "$ref"
            echo "::endgroup::"
          done

      # ── Deploy the app layer (creates/updates apps, identity, RBAC, job) ──
      - name: Deploy Bicep
        run: |
          # P1.2: the storage secret is owner-provisioned; probe the vault so the
          # template only references it once it exists (a dangling secretRef
          # would fail the whole deploy).
          if az keyvault secret list --vault-name "$KEY_VAULT_NAME" --query "[].name" -o tsv | grep -qxF "STORAGE-CONNECTION-STRING"; then
            storage=true
          else
            storage=false
            echo "STORAGE-CONNECTION-STRING not in Key Vault yet — deploying without DOCUMENT upload storage."
          fi
          az deployment group create \
            --resource-group "$RG" \
            --template-file infra/main.bicep \
            --parameters \
              location="$LOCATION" \
              containerAppsEnvName="$CONTAINER_APPS_ENV" \
              keyVaultName="$KEY_VAULT_NAME" \
              acrName="$ACR_NAME" \
              acrLoginServer="$ACR_LOGIN_SERVER" \
              imageTag="$IMAGE_TAG" \
              storageSecretAvailable="$storage"

      # ── Expose the deployed web FQDN for the e2e job ──
      - name: Resolve web FQDN
        id: fqdn
        run: |
          web="$(az containerapp show --name clientforce-web --resource-group "$RG" --query "properties.configuration.ingress.fqdn" -o tsv)"
          echo "web=$web" >> "$GITHUB_OUTPUT"
          echo "web FQDN: $web"

      # ── Run migrations (+ seed) inside the environment ──
      - name: Run migration job
        run: bash infra/scripts/run-migrate-job.sh clientforce-migrate

      # ── Smoke: api health + the web shell logs in against the cloud DB ──
      - name: Smoke test
        run: bash infra/scripts/smoke.sh

  # ── E2E browser smoke (Playwright) against the deployed staging web shell.
  #    Proves the APP_DATABASE_URL RLS path: login → switch workspace → contacts
  #    re-scope (3 → 1). Read-only (no writes), so safe to run on every deploy. ──
  e2e:
    name: e2e (Playwright vs staging)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @clientforce/e2e exec playwright install --with-deps chromium

      - name: Run e2e against staging
        run: pnpm --filter @clientforce/e2e run e2e
        env:
          CI: "true"
          E2E_BASE_URL: https://${{ needs.deploy.outputs.webFqdn }}
