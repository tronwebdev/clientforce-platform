# P2.1 diagnostics: did an inbound SMS (e.g. a STOP reply) ever reach Twilio,
# and where is the messaging service configured to deliver it? Prints counts,
# sids, statuses, error codes, and configured URLs ONLY — never phone numbers
# or message bodies (the owner's number is Key-Vault-only; run logs are public).
name: sms-inbound-probe

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}

jobs:
  probe:
    name: inbound messages · service config · webhook alerts
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Probe Twilio (safe fields only)
        run: |
          set -euo pipefail
          sid="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name TWILIO-ACCOUNT-SID --query value -o tsv)"
          token="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name TWILIO-AUTH-TOKEN --query value -o tsv)"
          msid="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name SMS-MESSAGING-SERVICE-SID --query value -o tsv)"
          echo "::add-mask::$sid"; echo "::add-mask::$token"; echo "::add-mask::$msid"

          echo "== 1) Recent messages, ALL directions + service/number binding (booleans only) =="
          export MSID="$msid"
          # The platform service pool numbers, fetched first so each message can
          # be checked against them without printing any number.
          pool="$(curl -sf -u "$sid:$token" "https://messaging.twilio.com/v1/Services/$msid/PhoneNumbers?PageSize=20" \
            | python3 -c 'import json,sys;print(",".join(n["phone_number"] for n in json.load(sys.stdin).get("phone_numbers",[])))')"
          echo "::add-mask::$pool"
          export POOL="$pool"
          curl -sf -u "$sid:$token" \
            "https://api.twilio.com/2010-04-01/Accounts/$sid/Messages.json?PageSize=15" \
            | python3 -c '
          import json, os, sys
          ours = os.environ.get("MSID", "")
          pool = [p for p in os.environ.get("POOL", "").split(",") if p]
          msgs = json.load(sys.stdin).get("messages", [])
          print(f"messages returned: {len(msgs)} (newest first); platform pool size: {len(pool)}")
          for m in msgs:
              svc = m.get("messaging_service_sid")
              inbound = m.get("direction") == "inbound"
              endpoint = m.get("to") if inbound else m.get("from")
              print(
                  f"  sid={m.get('"'"'sid'"'"')} direction={m.get('"'"'direction'"'"')}"
                  f" status={m.get('"'"'status'"'"')} error={m.get('"'"'error_code'"'"')}"
                  f" created={m.get('"'"'date_created'"'"')}"
                  f" | platform_service={svc == ours if svc else None}"
                  f" platform_number={endpoint in pool}"
              )
          '

          echo "== 2) Messaging service inbound config =="
          curl -sf -u "$sid:$token" "https://messaging.twilio.com/v1/Services/$msid" \
            | python3 -c '
          import json, sys
          s = json.load(sys.stdin)
          # friendly_name is a label, not a secret — it lets the owner confirm
          # WHICH service the platform uses when the account has several.
          for k in ("friendly_name", "inbound_request_url", "inbound_method", "fallback_url", "use_inbound_webhook_on_number", "sticky_sender"):
              print(f"{k}: {s.get(k)}")
          '

          echo "== 2b) ALL messaging services on the account (with number counts) =="
          services_json="$(curl -sf -u "$sid:$token" "https://messaging.twilio.com/v1/Services?PageSize=20")"
          for svc_sid in $(echo "$services_json" | python3 -c 'import json,sys;[print(s["sid"]) for s in json.load(sys.stdin).get("services",[])]'); do
            echo "::add-mask::$svc_sid"
            name="$(echo "$services_json" | SVC="$svc_sid" python3 -c 'import json,os,sys;print(next(s["friendly_name"] for s in json.load(sys.stdin)["services"] if s["sid"]==os.environ["SVC"]))')"
            count="$(curl -sf -u "$sid:$token" "https://messaging.twilio.com/v1/Services/$svc_sid/PhoneNumbers?PageSize=20" | python3 -c 'import json,sys;print(len(json.load(sys.stdin).get("phone_numbers",[])))')"
            mark=""
            [ "$svc_sid" = "$msid" ] && mark="  <-- PLATFORM SERVICE (SMS-MESSAGING-SERVICE-SID)"
            echo "  $name: numbers=$count$mark"
          done

          echo "== 3) Numbers attached to the service (count + per-number webhook override) =="
          curl -sf -u "$sid:$token" "https://messaging.twilio.com/v1/Services/$msid/PhoneNumbers?PageSize=20" \
            | python3 -c '
          import json, sys
          ns = json.load(sys.stdin).get("phone_numbers", [])
          print(f"numbers in service: {len(ns)}")
          for n in ns:
              print(f"  number sid={n.get('"'"'sid'"'"')} country={n.get('"'"'country_code'"'"')} capabilities={n.get('"'"'capabilities'"'"')}")
          '

          echo "== 4) Webhook delivery alerts (Twilio Monitor, newest first) =="
          curl -sf -u "$sid:$token" "https://monitor.twilio.com/v1/Alerts?PageSize=10" \
            | python3 -c '
          import json, sys
          alerts = json.load(sys.stdin).get("alerts", [])
          print(f"alerts returned: {len(alerts)}")
          for a in alerts:
              print(f"  {a.get('"'"'date_created'"'"')} error={a.get('"'"'error_code'"'"')} url={a.get('"'"'request_url'"'"')}")
          '
