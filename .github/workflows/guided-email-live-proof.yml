# G2 (DEC-071) guided-EMAIL staging proof: a REAL Sonnet-class composer renders
# two leads' emails from one brief through the full activity path — compose →
# deterministic checks (subject rules + footer ban) → the unchanged sendStep
# boundary rails — with the SendGrid transport in SANDBOX (nothing is
# delivered; live delivery was P1.5/P1.8's proof). Gates: variety, grounding,
# cage (subject/words/tokens/provenance meta + the CAN-SPAM footer appended by
# the BOUNDARY exactly once), the mixed-mode sequence (scripted step 1 +
# guided threaded follow-up, scripted meta byte-identical), and the trap-brief
# refusal walk (retry → typed refusal → pause + email.compose_refused.v1
# Event row via a REAL bus). Manual dispatch only; the API key comes from Key
# Vault OIDC.
name: guided-email-live-proof

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1
  DATABASE_URL: postgresql://postgres@localhost:5432/clientforce
  APP_DATABASE_URL: postgresql://clientforce_app@localhost:5432/clientforce
  REDIS_URL: redis://localhost:6379
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}

jobs:
  proof:
    name: real compose ×2 leads · footer-once cage · mixed-mode · trap-brief refusal
    runs-on: ubuntu-latest
    environment: staging
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: clientforce
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clientforce/workflows... build
      - run: pnpm --filter @clientforce/db db:migrate

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run guided email compose proof (sandbox transport; key masked)
        run: |
          set -euo pipefail
          key="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name ANTHROPIC-API-KEY --query value -o tsv)"
          echo "::add-mask::$key"
          ANTHROPIC_API_KEY="$key" pnpm exec tsx packages/workflows/scripts/guided-email-live-proof.ts
